name: Hello World Agent

on:
  workflow_dispatch:
    inputs:
      target-repo:
        description: "Target repository (owner/repo)"
        required: true

jobs:
  hello-world:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target-repo }}
          path: target-repo

      - name: Install fullsend
        run: |
          curl -LsSf https://github.com/maruiz93/fullsend/releases/download/runner-hello-world-dev/fullsend_dev_linux_amd64.tar.gz -o /tmp/fullsend.tar.gz
          sudo tar xzf /tmp/fullsend.tar.gz -C /usr/local/bin/
          fullsend --version

      - name: Install OpenShell
        run: |
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install.sh | sh
          openshell --version

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run hello-world agent
        env:
          REPO_NAME: ${{ inputs.target-repo }}
          TARGET_REPO_DIR: target-repo
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: |
          fullsend run hello-world --harness-dir .

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-output
          path: /tmp/fullsend/agent-hello-world-*/
